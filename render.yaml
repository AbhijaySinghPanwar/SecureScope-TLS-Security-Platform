services:
  - type: web
    name: securescope
    runtime: python
    plan: free
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn app.main_render:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
